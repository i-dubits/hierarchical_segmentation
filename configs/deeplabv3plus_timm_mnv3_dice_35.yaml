base_config: common.yaml

data:
  split_file: splits_deeplab_ft.json
  id_based_test_ratio: 0.1
  image_size: [384, 384]

model:
  name: deeplabv3plus_smp
  encoder_name: tu-mobilenetv3_large_100
  encoder_weights: imagenet
  encoder_output_stride: 16
  decoder_channels: 256
  dropout: 0.1
  freeze_backbone: false

training:
  epochs: 35
  batch_size: 20
  num_workers: 0
  lr: 0.0001
  scheduler:
    name: cosine
    warmup_epochs: 2
    warmup_start_factor: 0.2
    eta_min: 0.000001
  early_stopping:
    enabled: false
    patience: 8
    min_delta: 0.0
  dice:
    enabled: true
    weight: 0.2
    smooth: 1.0
    eps: 0.0000001
    exclude_background: true

mlflow:
  enabled: true
  tracking_uri: file:./mlruns
  experiment_name: pascal-part-segmentation
  run_name: deeplabv3plus_timm_mnv3_dice35_from_scratch_bs20
  log_artifacts: true
