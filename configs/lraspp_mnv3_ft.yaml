base_config: common.yaml

data:
  split_file: splits_deeplab_ft.json
  id_based_test_ratio: 0.1
  image_size: [384, 384]

model:
  name: lraspp_mobilenet_v3_large
  pretrained: false
  pretrained_backbone: true
  freeze_backbone: false
  inter_channels: 128
  dropout: 0.1

training:
  epochs: 30
  batch_size: 28
  lr: 0.0001
  scheduler:
    name: cosine
    warmup_epochs: 2
    warmup_start_factor: 0.2
    eta_min: 0.000001

mlflow:
  enabled: true
  tracking_uri: file:./mlruns
  experiment_name: pascal-part-segmentation
  run_name: lraspp_mnv3_ft
  log_artifacts: true
