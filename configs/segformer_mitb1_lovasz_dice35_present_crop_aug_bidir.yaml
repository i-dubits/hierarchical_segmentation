seed: 42
device: cuda

data:
  root: data/Pascal-part
  image_dir: JPEGImages
  mask_dir: gt_masks
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]
  split_file: splits_deeplab_ft.json
  id_based_test_ratio: 0.1
  val_ratio: 0.1
  test_ratio: 0.1
  image_size: [384, 384]
  class_aware_crop:
    enabled: true
    probability: 0.7
    crop_size: [320, 320]
    target_class_ids: [1, 3, 5, 6]
    min_target_pixels: 48
    max_tries: 20
    fallback_to_random_crop: true
  augmentations:
    scale_jitter:
      enabled: true
      min_scale: 0.75
      max_scale: 1.5
    photometric_distortion:
      enabled: true
      probability: 0.8
      brightness: 0.2
      contrast: 0.2
      saturation: 0.2
      hue: 0.02

model:
  name: segformer_smp
  encoder_name: mit_b1
  encoder_weights: imagenet
  decoder_segmentation_channels: 256
  upsampling: 4
  dropout: 0.1
  freeze_backbone: false

training:
  epochs: 35
  batch_size: 14
  grad_accum_steps: 2
  num_workers: 0
  lr: 0.0006
  weight_decay: 0.0001
  amp: true
  scheduler:
    name: cosine
    warmup_epochs: 4
    warmup_start_factor: 0.2
    eta_min: 0.000001
  checkpoint_metric: miou_l2
  loss_weights:
    l2: 1.0
    l1: 0.5
    l0: 0.25
    consistency: 0.2
  consistency: mse_bidirectional
  class_weights_l2: null
  early_stopping:
    enabled: true
    patience: 6
    min_delta: 0.0
    metric: miou_l2
    mode: max
  dice:
    enabled: true
    weight: 0.2
    smooth: 1.0
    eps: 0.0000001
    exclude_background: true
  lovasz:
    enabled: true
    weight: 0.2
    per_image: true
    ignore_index: null
    exclude_background: true
    present_only: true
  tversky:
    enabled: false
    weight: 0.0
    alpha: 0.5
    beta: 0.5
    smooth: 1.0
    eps: 0.0000001
    focal_gamma: 1.0
    exclude_background: true

mlflow:
  enabled: true
  tracking_uri: file:./mlruns
  experiment_name: pascal-part-segmentation
  run_name: segformer_mitb1_lovasz_dice35_present_crop_aug_bidir
  log_artifacts: true

inference:
  palette:
    level0:
      - [0, 0, 0]
      - [255, 255, 255]
    level1:
      - [0, 0, 0]
      - [255, 145, 70]
      - [65, 155, 255]
    level2:
      - [0, 0, 0]
      - [255, 120, 60]
      - [255, 70, 70]
      - [50, 135, 255]
      - [255, 225, 50]
      - [70, 235, 120]
      - [185, 80, 255]
