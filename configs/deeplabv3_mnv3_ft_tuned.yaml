base_config: common.yaml

data:
  split_file: splits_deeplab_ft.json
  id_based_test_ratio: 0.1
  image_size: [384, 384]

model:
  name: deeplabv3_mobilenet_v3_large
  pretrained: true
  pretrained_backbone: true
  freeze_backbone: false
  dropout: 0.1

training:
  epochs: 30
  batch_size: 28
  lr: 0.0001
  scheduler:
    name: cosine
    warmup_epochs: 2
    warmup_start_factor: 0.2
    eta_min: 0.000001
  # Inverse-frequency weights (normalized), with background clipped to 0.1.
  class_weights_l2: [0.1, 1.3521, 0.4263, 2.2625, 0.4928, 1.3107, 1.1179]
