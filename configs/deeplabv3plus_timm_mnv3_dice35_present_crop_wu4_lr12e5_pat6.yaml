base_config: common.yaml

data:
  split_file: splits_deeplab_ft.json
  id_based_test_ratio: 0.1
  image_size: [384, 384]
  class_aware_crop:
    enabled: true
    probability: 0.7
    crop_size: [320, 320]
    target_class_ids: [1, 3, 5, 6]
    min_target_pixels: 48
    max_tries: 20
    fallback_to_random_crop: true

model:
  name: deeplabv3plus_smp
  encoder_name: tu-mobilenetv3_large_100
  encoder_weights: imagenet
  encoder_output_stride: 16
  decoder_channels: 256
  dropout: 0.1
  freeze_backbone: false

training:
  epochs: 35
  batch_size: 20
  num_workers: 0
  lr: 0.00012
  scheduler:
    name: cosine
    warmup_epochs: 4
    warmup_start_factor: 0.2
    eta_min: 0.000001
  early_stopping:
    enabled: true
    patience: 6
    min_delta: 0.0
  dice:
    enabled: true
    weight: 0.2
    smooth: 1.0
    eps: 0.0000001
    exclude_background: true

mlflow:
  enabled: true
  tracking_uri: file:./mlruns
  experiment_name: pascal-part-segmentation
  run_name: deeplabv3plus_timm_mnv3_dice35_present_crop_wu4_lr12e5_pat6
  log_artifacts: true
